spring:
  application:
    name: gschool-backend

  datasource:
    # Values are read from environment variables. Defaults are provided for
    # local development only — never commit real credentials here.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gschool}
    username: ${DB_USERNAME:gschool}
    password: ${DB_PASSWORD:change-me-in-env}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    # Origins autorisées à appeler l'API (frontend Angular local par défaut).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
