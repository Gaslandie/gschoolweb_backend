spring:
  application:
    name: gschool-backend

  datasource:
    # Valeurs par défaut pour le développement local uniquement (non sensibles),
    # alignées sur docker-compose.yml. Surchargeables via variables d'environnement.
    # Ne jamais committer de véritables identifiants de production ici.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gschool_db}
    username: ${DB_USERNAME:gschool_user}
    password: ${DB_PASSWORD:gschool_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    # Origins autorisées à appeler l'API (frontend Angular local par défaut).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
